{% extends "base.html" %}
{% block content %}
<h1>📡 Radar de Oportunidades</h1>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;">

<!-- Coluna Esquerda -->
<div>
    <!-- Eventos Encontrados -->
    <div class="card">
        <h2>🎪 Eventos na Região</h2>
        <div style="display:flex;gap:8px;margin-bottom:10px;">
            <input id="regiaoRadar" value="Niterói" placeholder="Região" style="flex:1;">
            <button class="btn" onclick="buscarRadar()">🔍 Buscar</button>
        </div>
        <div id="resultadoRadar"></div>
    </div>
    
    <!-- Fornecedores em Destaque -->
    <div class="card">
        <h2>🏪 Fornecedores Alternativos</h2>
        <button class="btn" onclick="carregarFornecedores()" style="width:100%;">🔄 Atualizar</button>
        <div id="resultadoFornecedores" style="margin-top:10px;"></div>
    </div>
</div>

<!-- Coluna Direita -->
<div>
    <!-- Alertas de Preços -->
    <div class="card">
        <h2>💰 Promoções Encontradas</h2>
        <button class="btn" onclick="carregarAlertas()" style="width:100%;">🔍 Verificar Promoções</button>
        <div id="resultadoAlertas" style="margin-top:10px;"></div>
    </div>
    
    <!-- Dicas e Links -->
    <div class="card">
        <h2>🔗 Links Úteis</h2>
        <div id="linksUteis">
            <a href="https://www.sympla.com.br" target="_blank" class="btn btn-outline" style="display:block;margin:5px 0;text-align:center;">🎫 Sympla - Eventos</a>
            <a href="https://www.eventbrite.com.br" target="_blank" class="btn btn-outline" style="display:block;margin:5px 0;text-align:center;">🎫 Eventbrite</a>
            <a href="https://shopping.google.com" target="_blank" class="btn btn-outline" style="display:block;margin:5px 0;text-align:center;">🛒 Google Shopping</a>
            <a href="https://www.mercadolivre.com.br" target="_blank" class="btn btn-outline" style="display:block;margin:5px 0;text-align:center;">🛒 Mercado Livre</a>
        </div>
    </div>
</div>

</div>

<script>
// ========== RADAR DE EVENTOS ==========
async function buscarRadar() {
    var regiao = document.getElementById('regiaoRadar').value || 'Niterói';
    document.getElementById('resultadoRadar').innerHTML = '<p style="color:#8B6B4A;">📡 Buscando eventos...</p>';
    try {
        var resp = await fetch('/api/eventos-inteligentes/radar?regiao=' + encodeURIComponent(regiao));
        var data = await resp.json();
        var html = '';
        data.forEach(function(e) {
            var cor = e.match === 'altissima' ? '#D4B896' : e.match === 'alta' ? '#4CAF50' : '#8B6B4A';
            html += '<div style="padding:12px;margin:8px 0;background:#3E3526;border-radius:8px;border-left:4px solid ' + cor + ';">';
            html += '<strong>' + (e.match === 'altissima' ? '⭐ ' : '') + e.nome + '</strong><br>';
            html += '📅 ' + new Date(e.data + 'T00:00:00').toLocaleDateString('pt-BR') + ' | 📍 ' + e.local + '<br>';
            html += '👥 ' + e.publico_estimado + ' pessoas | 💰 Custo: R$ ' + e.custo_estimado.toFixed(2) + '<br>';
            html += '🔗 ' + e.fonte + ' | ⏰ Inscrições até: ' + e.prazo_inscricao + '<br>';
            html += '<a href="' + e.inscricao + '" target="_blank" class="btn" style="font-size:0.75em;margin-top:5px;">Inscrever-se</a>';
            html += '</div>';
        });
        document.getElementById('resultadoRadar').innerHTML = html || '<p style="color:#8B6B4A;">Nenhum evento encontrado para ' + regiao + '.</p>';
    } catch(e) {
        document.getElementById('resultadoRadar').innerHTML = '<p style="color:#C23B22;">Erro ao buscar eventos.</p>';
    }
}

// ========== FORNECEDORES ALTERNATIVOS ==========
async function carregarFornecedores() {
    document.getElementById('resultadoFornecedores').innerHTML = '<p style="color:#8B6B4A;">Buscando...</p>';
    try {
        var resp = await fetch('/api/monitor/fornecedores');
        var data = await resp.json();
        var html = '';
        (data.categorias || []).forEach(function(cat) {
            html += '<h4 style="color:#D4B896;margin:10px 0 5px;">' + cat.categoria + '</h4>';
            (cat.fornecedores || []).forEach(function(f) {
                html += '<p style="padding:5px;margin:2px 0;">🏪 <strong>' + f.nome + '</strong> - ' + f.diferencial + '</p>';
            });
        });
        html += '<p style="margin-top:8px;color:#D4B896;">💡 ' + (data.dica_negociacao || '') + '</p>';
        document.getElementById('resultadoFornecedores').innerHTML = html || '<p style="color:#8B6B4A;">Nenhum fornecedor encontrado.</p>';
    } catch(e) {
        document.getElementById('resultadoFornecedores').innerHTML = '<p style="color:#C23B22;">Erro.</p>';
    }
}

// ========== ALERTAS DE PREÇOS ==========
async function carregarAlertas() {
    document.getElementById('resultadoAlertas').innerHTML = '<p style="color:#8B6B4A;">Verificando promoções...</p>';
    try {
        var resp = await fetch('/api/monitor/alertas');
        var data = await resp.json();
        var html = '';
        if (data.alertas && data.alertas.length > 0) {
            html += '<p style="color:#4CAF50;">💰 Economia total: <strong>R$ ' + (data.economia_total || 0).toFixed(2) + '</strong></p>';
            data.alertas.forEach(function(a) {
                var cor = a.prioridade === 'alta' ? '#C23B22' : a.prioridade === 'media' ? '#D4B896' : '#8B6B4A';
                html += '<div style="padding:10px;margin:5px 0;background:#3E3526;border-radius:8px;border-left:3px solid ' + cor + ';">';
                html += '<strong>' + a.produto + '</strong><br>';
                html += 'De R$ ' + a.preco_normal.toFixed(2) + ' por <span style="color:#4CAF50;">R$ ' + a.preco_promocional.toFixed(2) + '</span> (' + a.desconto + ' OFF)<br>';
                html += '🏪 ' + a.fornecedor + ' | ⏰ ' + a.validade;
                html += '</div>';
            });
        } else {
            html += '<p style="color:#8B6B4A;">Nenhuma promoção no momento.</p>';
        }
        document.getElementById('resultadoAlertas').innerHTML = html;
    } catch(e) {
        document.getElementById('resultadoAlertas').innerHTML = '<p style="color:#C23B22;">Erro.</p>';
    }
}

// Carregar automaticamente
buscarRadar();
</script>
{% endblock %}
