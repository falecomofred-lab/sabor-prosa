<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabor e Prosa - Cadastro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #1A120B; color: #F5E6D3; padding: 20px; }
        .card { background: #3E3526; border-radius: 16px; padding: 30px; max-width: 400px; margin: 0 auto; }
        .card h1 { color: #D4B896; text-align: center; font-size: 1.3em; margin-bottom: 5px; }
        .card p { text-align: center; color: #8B6B4A; margin-bottom: 20px; font-size: 0.9em; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #D4B896; font-size: 0.9em; }
        .form-group input, .form-group select { background: #2A1F14; border: 1px solid #5C4A37; color: #F5E6D3; padding: 12px; border-radius: 8px; width: 100%; font-size: 1em; }
        .btn { background: #8B6B4A; color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-size: 1.1em; width: 100%; font-weight: bold; margin-top: 10px; }
        .google-btn { background: #4285F4; }
        .apple-btn { background: #000; }
        .divider { text-align: center; margin: 15px 0; color: #8B6B4A; }
        .sucesso { color: #4CAF50; text-align: center; display: none; }
        .footer { text-align: center; margin-top: 20px; font-size: 0.8em; color: #8B6B4A; }
        .footer a { color: #D4B896; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🍽️ Sabor e Prosa</h1>
        <p>Cadastro rápido para receber novidades</p>
        
        <button class="btn google-btn" onclick="alert('Login com Google em breve!')">📧 Continuar com Google</button>
        <button class="btn apple-btn" onclick="alert('Login com Apple em breve!')" style="margin-top:8px;">🍎 Continuar com Apple</button>
        
        <div class="divider">— ou —</div>
        
        <form onsubmit="return cadastrar(event)">
            <div class="form-group">
                <label>Nome</label>
                <input type="text" id="nome" placeholder="Seu nome" required>
            </div>
            <div class="form-group">
                <label>Telefone</label>
                <input type="tel" id="telefone" placeholder="(11) 99999-9999" required>
            </div>
            <div class="form-group">
                <label>Como nos conheceu?</label>
                <select id="origem" required>
                    <option value="">Selecione...</option>
                    <option value="feira">🏪 Feira/Evento</option>
                    <option value="instagram">📱 Instagram</option>
                    <option value="whatsapp">💬 WhatsApp</option>
                    <option value="indicacao">👥 Indicação</option>
                    <option value="outro">🔍 Outro</option>
                </select>
            </div>
            <button type="submit" class="btn">📱 Receber código via WhatsApp</button>
        </form>
        
        <div class="sucesso" id="sucesso">
            <h3>✅ Cadastro enviado!</h3>
            <p>Você receberá um código de confirmação via WhatsApp.</p>
        </div>
    </div>
    
    <div class="footer">Desenvolvido por <a href="https://venure.com.br" target="_blank">venure.com.br</a></div>
    
    <script>
        async function cadastrar(e) {
            e.preventDefault();
            const nome = document.getElementById('nome').value;
            const telefone = document.getElementById('telefone').value;
            const origem = document.getElementById('origem').value;
            
            try {
                await fetch('/api/clientes/cadastro-evento', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({nome, telefone, origem, evento: 'QR Code Feira'})
                });
                document.querySelector('form').style.display = 'none';
                document.getElementById('sucesso').style.display = 'block';
            } catch(e) {
                alert('Erro ao cadastrar. Tente novamente.');
            }
        }
    </script>
</body>
</html>
