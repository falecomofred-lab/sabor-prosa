{% extends "base.html" %}
{% block content %}
<h1>📦 Produtos</h1>

<!-- Barra de busca e filtros -->
<div class="card" style="margin-bottom:15px;">
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
        <input id="buscaProduto" placeholder="🔍 Buscar produto..." oninput="filtrarProdutos()" style="flex:1;min-width:200px;">
        <select id="filtroCategoria" onchange="filtrarProdutos()" style="width:auto;">
            <option value="Todos">Todas categorias</option>
            <option value="Queijos">🧀 Queijos</option>
            <option value="Vinhos">🍷 Vinhos</option>
            <option value="Geleias">🍯 Geleias</option>
            <option value="Cafes">☕ Cafés</option>
            <option value="Outros">🛒 Outros</option>
        </select>
        <button class="btn" onclick="window.location.href='/produtos'">➕ Novo Produto</button>
    </div>
</div>

<!-- Grid de produtos -->
<div id="gridProdutos" class="product-grid"></div>

<!-- Modal de edição rápida -->
<div id="modalEdicao" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:2000;align-items:center;justify-content:center;">
    <div style="background:#2A1F14;padding:25px;border-radius:16px;width:90%;max-width:500px;max-height:80vh;overflow-y:auto;">
        <h2 id="tituloModal">Editar Produto</h2>
        <form onsubmit="salvarEdicao(event)" id="formEdicao">
            <input type="hidden" id="editId">
            <div class="form-group"><label>Nome</label><input id="editNome" required></div>
            <div class="form-group"><label>Categoria</label><select id="editCategoria"><option>Queijos</option><option>Vinhos</option><option>Geleias</option><option>Cafés</option><option>Outros</option></select></div>
            <div class="form-row">
                <div class="form-group"><label>Preço Custo (R$)</label><input id="editCusto" type="number" step="0.01" oninput="calcMargem()"></div>
                <div class="form-group"><label>Preço Venda (R$)</label><input id="editVenda" type="number" step="0.01" oninput="calcMargem()"></div>
            </div>
            <div id="margemPreview" style="text-align:center;font-size:1.2em;color:#D4B896;margin:10px 0;"></div>
            <div class="form-row">
                <div class="form-group"><label>Estoque</label><input id="editEstoque" type="number"></div>
                <div class="form-group"><label>Mínimo</label><input id="editMinimo" type="number"></div>
            </div>
            <div class="form-group"><label>Descrição</label><input id="editDescricao"></div>
            <button class="btn" type="submit" style="width:100%;">💾 Salvar</button>
            <button type="button" class="btn btn-outline" onclick="document.getElementById('modalEdicao').style.display='none'" style="width:100%;margin-top:5px;">Cancelar</button>
        </form>
    </div>
</div>

<style>
    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 12px; }
    .product-card { background: #3E3526; border-radius: 12px; overflow: hidden; transition: transform 0.2s; }
    .product-card:hover { transform: translateY(-2px); }
    .product-card .foto { width: 100%; height: 160px; object-fit: cover; background: #2A1F14; display: flex; align-items: center; justify-content: center; font-size: 3em; }
    .product-card .info { padding: 15px; }
    .product-card .nome { font-weight: bold; font-size: 1em; margin-bottom: 4px; }
    .product-card .categoria { color: #8B6B4A; font-size: 0.8em; }
    .product-card .preco { color: #D4B896; font-size: 1.3em; font-weight: bold; margin: 8px 0; }
    .product-card .estoque { font-size: 0.85em; }
    .product-card .estoque.baixo { color: #C23B22; }
    .product-card .acoes { display: flex; gap: 6px; margin-top: 10px; }
    .product-card .acoes button { flex: 1; padding: 6px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.8em; }
    .btn-editar { background: #8B6B4A; color: white; }
    .btn-duplicar { background: #5C4A37; color: white; }
    .btn-excluir { background: #C23B22; color: white; }
</style>

<script>
let todosProdutos = [];

// Carregar produtos
fetch('/api/produtos/').then(r => r.json()).then(data => {
    todosProdutos = data;
    renderizar(data);
});

function renderizar(lista) {
    const grid = document.getElementById('gridProdutos');
    if (lista.length === 0) {
        grid.innerHTML = '<div class="card" style="text-align:center;padding:40px;"><p style="color:#8B6B4A;">Nenhum produto encontrado.</p><a href="/produtos" class="btn">➕ Cadastrar Produto</a></div>';
        return;
    }
    grid.innerHTML = lista.map(p => 
        '<div class="product-card">' +
        '<div class="foto">' + (p.foto_url ? '<img src="' + p.foto_url + '" style="width:100%;height:160px;object-fit:cover;">' : '📦') + '</div>' +
        '<div class="info">' +
        '<div class="nome">' + p.nome + '</div>' +
        '<div class="categoria">' + p.categoria + (p.codigo_barras ? ' | ' + p.codigo_barras : '') + '</div>' +
        '<div class="preco">R$ ' + p.preco_venda.toFixed(2) + '</div>' +
        '<div class="estoque ' + (p.estoque_atual <= p.estoque_minimo ? 'baixo' : '') + '">📦 ' + p.estoque_atual + ' unid. | Margem: ' + p.margem_percentual + '%' + (p.estoque_atual <= p.estoque_minimo ? ' ⚠️' : '') + '</div>' +
        '<div class="acoes">' +
        '<button class="btn-editar" onclick="editarProduto(' + p.id + ')">✏️ Editar</button>' +
        '<button class="btn-duplicar" onclick="duplicar(' + p.id + ')">📋</button>' +
        '<button class="btn-excluir" onclick="excluir(' + p.id + ')">🗑️</button>' +
        '</div></div></div>'
    ).join('');
}

function filtrarProdutos() {
    const busca = document.getElementById('buscaProduto').value.toLowerCase();
    const cat = document.getElementById('filtroCategoria').value;
    let filtrados = todosProdutos;
    if (cat !== 'Todos') filtrados = filtrados.filter(p => p.categoria === cat);
    if (busca) filtrados = filtrados.filter(p => p.nome.toLowerCase().includes(busca) || (p.codigo_barras && p.codigo_barras.includes(busca)));
    renderizar(filtrados);
}

function editarProduto(id) {
    const p = todosProdutos.find(x => x.id === id);
    if (!p) return;
    document.getElementById('editId').value = p.id;
    document.getElementById('editNome').value = p.nome;
    document.getElementById('editCategoria').value = p.categoria;
    document.getElementById('editCusto').value = p.preco_custo;
    document.getElementById('editVenda').value = p.preco_venda;
    document.getElementById('editEstoque').value = p.estoque_atual;
    document.getElementById('editMinimo').value = p.estoque_minimo;
    document.getElementById('editDescricao').value = p.descricao_curta || '';
    calcMargem();
    document.getElementById('modalEdicao').style.display = 'flex';
}

function calcMargem() {
    const c = parseFloat(document.getElementById('editCusto').value) || 0;
    const v = parseFloat(document.getElementById('editVenda').value) || 0;
    const m = c > 0 ? ((v - c) / c * 100).toFixed(1) : 0;
    document.getElementById('margemPreview').textContent = 'Margem: ' + m + '%';
    document.getElementById('margemPreview').style.color = m >= 0 ? '#4CAF50' : '#C23B22';
}

async function salvarEdicao(e) {
    e.preventDefault();
    const id = document.getElementById('editId').value;
    const dados = {
        nome: document.getElementById('editNome').value,
        categoria: document.getElementById('editCategoria').value,
        preco_custo: parseFloat(document.getElementById('editCusto').value),
        preco_venda: parseFloat(document.getElementById('editVenda').value),
        estoque_atual: parseInt(document.getElementById('editEstoque').value),
        estoque_minimo: parseInt(document.getElementById('editMinimo').value),
        descricao_curta: document.getElementById('editDescricao').value
    };
    await fetch('/api/produtos/' + id, {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(dados)});
    location.reload();
}

async function duplicar(id) {
    if (confirm('Duplicar este produto?')) {
        await fetch('/api/produtos/' + id + '/duplicar', {method:'POST'});
        location.reload();
    }
}

async function excluir(id) {
    if (confirm('Excluir este produto?')) {
        await fetch('/api/produtos/' + id, {method:'DELETE'});
        location.reload();
    }
}
</script>
{% endblock %}
