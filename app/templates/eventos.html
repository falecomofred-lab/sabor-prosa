{% extends "base.html" %}
{% block content %}
<h1>🎉 Eventos</h1>
<div class="card"><h2>Novo Evento</h2><form method="post" action="/api/eventos/form">
<div class="form-row"><div class="form-group"><label>Nome*</label><input name="nome" required></div><div class="form-group"><label>Data</label><input name="data" type="date"></div></div>
<div class="form-row"><div class="form-group"><label>Local</label><input name="local"></div><div class="form-group"><label>Tipo</label><select name="tipo"><option>cultural</option><option>gastronômico</option><option>feira</option><option>outro</option></select></div></div>
<div class="form-group"><label>Descrição</label><textarea name="descricao" rows="2"></textarea></div>
<button class="btn" type="submit">💾 Salvar</button></form></div>
<div class="card"><h2>📋 Lista ({{ eventos|length }})</h2><table><tr><th>Nome</th><th>Data</th><th>Local</th><th>Tipo</th></tr>{% for e in eventos %}<tr><td>{{ e.nome }}</td><td>{{ e.data }}</td><td>{{ e.local }}</td><td>{{ e.tipo }}</td></tr>{% endfor %}</table></div>
{% endblock %}
