{% extends "base.html" %}
{% block content %}
<h1>📱 Auditoria de Estoque</h1>

<div class="card">
    <h2>📷 Bipador Contínuo</h2>
    <p style="color:#D4B896;">Aponte a câmera para os códigos de barras. Beep = +1 no produto.</p>
    
    <div style="text-align:center;margin:20px 0;">
        <button class="btn" id="btnIniciar" onclick="iniciarScanner()" style="font-size:1.2em;padding:15px 30px;">
            📷 Iniciar Scanner
        </button>
        <button class="btn" id="btnParar" onclick="pararScanner()" style="font-size:1.2em;padding:15px 30px;background:#C23B22;display:none;">
            ⏹️ Parar Scanner
        </button>
    </div>
    
    <div id="scannerArea" style="display:none;">
        <p id="statusScan" style="text-align:center;margin-top:10px;color:#4CAF50;font-size:1.1em;">Aguardando código...</p>
    </div>
</div>

<div class="card">
    <h2>📋 Contagem Atual</h2>
    <div id="contagem" style="min-height:100px;">
        <p style="color:#8B6B4A;">Nenhum produto bipado ainda.</p>
    </div>
    <div style="margin-top:15px;display:flex;gap:10px;">
        <button class="btn" onclick="sincronizar()" style="font-size:1.1em;flex:1;">
            🔄 Sincronizar com Estoque
        </button>
        <button class="btn" onclick="zerarContagem()" style="font-size:1.1em;background:#C23B22;flex:1;">
            🗑️ Zerar Contagem
        </button>
    </div>
</div>

<script>
// ========== BIP NATIVO (Web Audio API) - 15 linhas, zero dependências ==========
function tocarBip() {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'square';
    osc.frequency.value = 850;
    gain.gain.setValueAtTime(0.1, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.1);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.1);
}

// ========== CONTAGEM ==========
let contagem = {};
let scannerAtivo = false;
let bufferCodigo = '';
let timeoutCodigo = null;

function iniciarScanner() {
    scannerAtivo = true;
    document.getElementById('btnIniciar').style.display = 'none';
    document.getElementById('btnParar').style.display = 'inline-block';
    document.getElementById('scannerArea').style.display = 'block';
    document.getElementById('statusScan').textContent = '📷 Scanner ativo! Aponte para códigos de barras...';
    document.addEventListener('keydown', capturarCodigo);
}

function pararScanner() {
    scannerAtivo = false;
    document.getElementById('btnIniciar').style.display = 'inline-block';
    document.getElementById('btnParar').style.display = 'none';
    document.getElementById('scannerArea').style.display = 'none';
    document.removeEventListener('keydown', capturarCodigo);
    document.getElementById('statusScan').textContent = 'Scanner pausado. Total: ' + Object.keys(contagem).length + ' produtos diferentes.';
}

function capturarCodigo(e) {
    if (!scannerAtivo) return;
    if (e.key === 'Enter') {
        if (bufferCodigo.length > 3) {
            processarCodigo(bufferCodigo);
        }
        bufferCodigo = '';
        return;
    }
    if (e.key.length === 1) {
        bufferCodigo += e.key;
        clearTimeout(timeoutCodigo);
        timeoutCodigo = setTimeout(() => { bufferCodigo = ''; }, 100);
    }
}

async function processarCodigo(codigo) {
    tocarBip();
    try {
        const resp = await fetch('/api/pdv/buscar?codigo=' + codigo);
        const data = await resp.json();
        if (!data.erro) {
            if (contagem[codigo]) {
                contagem[codigo].qtd++;
            } else {
                contagem[codigo] = { nome: data.nome, qtd: 1 };
            }
            document.getElementById('statusScan').textContent = '✅ ' + data.nome + ' - Total: ' + contagem[codigo].qtd;
            document.getElementById('statusScan').style.color = '#4CAF50';
        } else {
            document.getElementById('statusScan').textContent = '❌ Produto não encontrado: ' + codigo;
            document.getElementById('statusScan').style.color = '#C23B22';
        }
    } catch(e) {
        document.getElementById('statusScan').textContent = 'Erro: ' + e;
    }
    renderizarContagem();
}

function renderizarContagem() {
    const div = document.getElementById('contagem');
    const itens = Object.entries(contagem);
    if (itens.length === 0) {
        div.innerHTML = '<p style="color:#8B6B4A;">Nenhum produto bipado ainda.</p>';
        return;
    }
    div.innerHTML = '<table><tr><th>Produto</th><th style="text-align:center;">Quantidade</th></tr>' +
        itens.map(([cod, i]) => '<tr><td>' + i.nome + '</td><td style="text-align:center;font-size:1.5em;font-weight:bold;color:#D4B896;">' + i.qtd + '</td></tr>').join('') +
        '</table>';
}

function zerarContagem() {
    if (confirm('Tem certeza que deseja zerar toda a contagem?')) {
        contagem = {};
        renderizarContagem();
    }
}

async function sincronizar() {
    if (Object.keys(contagem).length === 0) {
        alert('Nenhum produto bipado para sincronizar.');
        return;
    }
    const total = Object.values(contagem).reduce((s, i) => s + i.qtd, 0);
    if (confirm('Sincronizar ' + total + ' itens de ' + Object.keys(contagem).length + ' produtos diferentes?')) {
        alert('✅ Sincronização simulada com sucesso! ' + total + ' itens processados.');
        contagem = {};
        renderizarContagem();
    }
}
</script>
{% endblock %}
