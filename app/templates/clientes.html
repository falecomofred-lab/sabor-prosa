{% extends "base.html" %}
{% block content %}
<h1>👥 Clientes</h1>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;">

<!-- Formulário -->
<div class="card">
    <h2 id="tituloCliente">➕ Novo Cliente</h2>
    <form onsubmit="salvarCliente(event)" id="formCliente">
        <input type="hidden" id="cliId">
        <div class="form-row">
            <div class="form-group"><label>Nome*</label><input id="cliNome" required></div>
            <div class="form-group"><label>Telefone*</label><input id="cliTelefone" required placeholder="(11) 99999-9999"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>Email</label><input id="cliEmail" type="email"></div>
            <div class="form-group"><label>CPF</label><input id="cliCpf" placeholder="000.000.000-00"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>Nascimento</label><input id="cliNascimento" type="date"></div>
            <div class="form-group"><label>Endereço</label><input id="cliEndereco"></div>
        </div>
        <div class="form-group"><label>Observações</label><textarea id="cliObs" rows="2"></textarea></div>
        <button class="btn" type="submit" style="width:100%;">💾 Salvar</button>
        <button type="button" class="btn btn-outline" onclick="limparForm()" style="width:100%;margin-top:5px;display:none;" id="btnCancelarCli">Cancelar</button>
    </form>
</div>

<!-- Lista -->
<div>
    <div class="card" style="margin-bottom:15px;">
        <div style="display:flex;gap:8px;">
            <input id="buscaCliente" placeholder="🔍 Buscar cliente..." oninput="filtrar()" style="flex:1;">
            <select id="filtroTag" onchange="filtrar()" style="width:auto;">
                <option value="Todos">Todos</option>
                <option value="VIP">⭐ VIP</option>
                <option value="Inativo">💤 Inativos</option>
                <option value="feira">🏪 Feira/Evento</option>
            </select>
        </div>
    </div>
    <div id="listaClientes">
        <p style="color:#8B6B4A;text-align:center;padding:30px;">Carregando clientes...</p>
    </div>
</div>

</div>

<script>
let clientes = [];

// Carregar clientes via API
async function carregarClientes() {
    try {
        const resp = await fetch('/api/clientes/listar');
        const data = await resp.json();
        clientes = data;
        renderizar(clientes);
    } catch(e) {
        // Fallback: recarregar a página
        window.location.reload();
    }
}

carregarClientes();

function renderizar(lista) {
    var div = document.getElementById('listaClientes');
    if (lista.length === 0) {
        div.innerHTML = '<div class="card" style="text-align:center;padding:30px;"><p style="color:#8B6B4A;">Nenhum cliente encontrado.</p></div>';
        return;
    }
    div.innerHTML = '';
    lista.forEach(function(c) {
        var tags = '';
        var obs = c.observacoes || '';
        if (obs.indexOf('VIP') >= 0) tags += '<span style="background:#D4B896;color:#1A120B;padding:2px 8px;border-radius:10px;font-size:0.7em;margin-right:4px;">⭐ VIP</span>';
        if (obs.indexOf('Inativo') >= 0) tags += '<span style="background:#C23B22;color:white;padding:2px 8px;border-radius:10px;font-size:0.7em;margin-right:4px;">💤</span>';
        if (obs.indexOf('feira') >= 0 || obs.indexOf('Feira') >= 0 || obs.indexOf('evento') >= 0 || obs.indexOf('Evento') >= 0) tags += '<span style="background:#4CAF50;color:white;padding:2px 8px;border-radius:10px;font-size:0.7em;">🏪 Feira</span>';
        
        var card = document.createElement('div');
        card.className = 'card';
        card.style.cssText = 'margin-bottom:8px;cursor:pointer;';
        card.onclick = function() { editar(c.id); };
        
        var telefone = (c.telefone || '').replace(/\D/g, '');
        var total = c.total_compras || 0;
        
        card.innerHTML = 
            '<div style="display:flex;justify-content:space-between;align-items:center;">' +
            '<div>' +
            '<strong>' + c.nome + '</strong> ' + tags + '<br>' +
            '<span style="color:#8B6B4A;font-size:0.85em;">📱 ' + (c.telefone || '-') + ' | 💰 R$ ' + total.toFixed(2) + '</span>' +
            '</div>' +
            '<a href="https://wa.me/55' + telefone + '" target="_blank" onclick="event.stopPropagation()" class="btn" style="background:#25D366;font-size:0.8em;padding:6px 10px;">📱</a>' +
            '</div>';
        
        div.appendChild(card);
    });
}

function filtrar() {
    var busca = document.getElementById('buscaCliente').value.toLowerCase();
    var tag = document.getElementById('filtroTag').value;
    var filtrados = clientes;
    if (tag === 'VIP') filtrados = filtrados.filter(function(c) { return (c.observacoes || '').indexOf('VIP') >= 0; });
    if (tag === 'Inativo') filtrados = filtrados.filter(function(c) { return (c.observacoes || '').indexOf('Inativo') >= 0; });
    if (tag === 'feira') filtrados = filtrados.filter(function(c) { var o = c.observacoes || ''; return o.indexOf('feira') >= 0 || o.indexOf('Feira') >= 0 || o.indexOf('evento') >= 0 || o.indexOf('Evento') >= 0; });
    if (busca) filtrados = filtrados.filter(function(c) { return c.nome.toLowerCase().indexOf(busca) >= 0 || (c.telefone || '').indexOf(busca) >= 0; });
    renderizar(filtrados);
}

function editar(id) {
    var c = clientes.find(function(x) { return x.id == id; });
    if (!c) return;
    document.getElementById('tituloCliente').textContent = '✏️ Editar Cliente';
    document.getElementById('cliId').value = c.id;
    document.getElementById('cliNome').value = c.nome || '';
    document.getElementById('cliTelefone').value = c.telefone || '';
    document.getElementById('cliEmail').value = c.email || '';
    document.getElementById('cliCpf').value = c.cpf || '';
    document.getElementById('cliNascimento').value = c.data_nascimento || '';
    document.getElementById('cliEndereco').value = c.endereco || '';
    document.getElementById('cliObs').value = c.observacoes || '';
    document.getElementById('btnCancelarCli').style.display = 'inline-block';
}

function limparForm() {
    document.getElementById('tituloCliente').textContent = '➕ Novo Cliente';
    document.getElementById('formCliente').reset();
    document.getElementById('cliId').value = '';
    document.getElementById('btnCancelarCli').style.display = 'none';
}

async function salvarCliente(e) {
    e.preventDefault();
    var formData = new FormData();
    formData.append('nome', document.getElementById('cliNome').value);
    formData.append('telefone', document.getElementById('cliTelefone').value);
    formData.append('email', document.getElementById('cliEmail').value);
    formData.append('cpf', document.getElementById('cliCpf').value);
    formData.append('data_nascimento', document.getElementById('cliNascimento').value);
    formData.append('endereco', document.getElementById('cliEndereco').value);
    formData.append('observacoes', document.getElementById('cliObs').value);
    var id = document.getElementById('cliId').value;
    if (id) formData.append('id', id);
    
    var params = new URLSearchParams(formData);
    await fetch('/api/clientes/form', {method:'POST', body: params});
    window.location.reload();
}
</script>
{% endblock %}
