{% extends "base.html" %}
{% block content %}
<h1>👥 Clientes</h1>
<div class="card"><h2>Novo Cliente</h2><form method="post" action="/api/clientes/form">
<div class="form-row"><div class="form-group"><label>Nome*</label><input name="nome" required></div><div class="form-group"><label>Telefone*</label><input name="telefone" required></div></div>
<div class="form-row"><div class="form-group"><label>Email</label><input name="email" type="email"></div><div class="form-group"><label>CPF</label><input name="cpf"></div></div>
<div class="form-row"><div class="form-group"><label>Data Nascimento</label><input name="data_nascimento" type="date"></div><div class="form-group"><label>Endereço</label><input name="endereco"></div></div>
<div class="form-group"><label>Observações</label><textarea name="observacoes" rows="2"></textarea></div>
<button class="btn" type="submit">💾 Salvar</button></form></div>
<div class="card"><h2>📋 Lista ({{ clientes|length }})</h2><table><tr><th>Nome</th><th>Telefone</th><th>Total Compras</th></tr>{% for c in clientes %}<tr><td>{{ c.nome }}</td><td>{{ c.telefone }}</td><td>R$ {{ "%.2f"|format(c.total_compras) }}</td></tr>{% endfor %}</table></div>
{% endblock %}
