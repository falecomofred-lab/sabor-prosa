{% extends "base.html" %}
{% block content %}
<h1>📦 Monitor de Preços</h1>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;">

<!-- Coluna Esquerda -->
<div>
    <!-- Alertas de Promoções -->
    <div class="card">
        <h2>🚨 Promoções Ativas</h2>
        <button class="btn" onclick="carregarAlertas()" style="width:100%;">🔍 Verificar Promoções</button>
        <div id="resultadoAlertas" style="margin-top:10px;"></div>
    </div>
    
    <!-- Produtos Monitorados -->
    <div class="card">
        <h2>📋 Produtos Monitorados</h2>
        <button class="btn" onclick="carregarProdutos()" style="width:100%;">📋 Listar Produtos</button>
        <div id="resultadoProdutos" style="margin-top:10px;"></div>
    </div>
</div>

<!-- Coluna Direita -->
<div>
    <!-- Fornecedores Alternativos -->
    <div class="card">
        <h2>🏪 Fornecedores Alternativos</h2>
        <button class="btn" onclick="carregarFornecedores()" style="width:100%;">🏪 Ver Fornecedores</button>
        <div id="resultadoFornecedores" style="margin-top:10px;"></div>
    </div>
    
    <!-- Links Úteis -->
    <div class="card">
        <h2>🔗 Onde Pesquisar</h2>
        <div id="ondeBuscar">
            <a href="https://shopping.google.com" target="_blank" class="btn btn-outline" style="display:block;margin:5px 0;text-align:center;">🛒 Google Shopping</a>
            <a href="https://www.mercadolivre.com.br" target="_blank" class="btn btn-outline" style="display:block;margin:5px 0;text-align:center;">🛒 Mercado Livre</a>
            <a href="https://www.amazon.com.br" target="_blank" class="btn btn-outline" style="display:block;margin:5px 0;text-align:center;">🛒 Amazon</a>
            <a href="https://shopee.com.br" target="_blank" class="btn btn-outline" style="display:block;margin:5px 0;text-align:center;">🛒 Shopee</a>
        </div>
    </div>
</div>

</div>

<script>
async function carregarAlertas() {
    document.getElementById('resultadoAlertas').innerHTML = '<p style="color:#8B6B4A;">Verificando...</p>';
    try {
        var resp = await fetch('/api/monitor/alertas'), data = await resp.json();
        var html = '';
        if (data.alertas && data.alertas.length) {
            html += '<p style="color:#4CAF50;">💰 Economia total: <strong>R$ ' + (data.economia_total||0).toFixed(2) + '</strong></p>';
            data.alertas.forEach(function(a) {
                var cor = a.prioridade === 'alta' ? '#C23B22' : a.prioridade === 'media' ? '#D4B896' : '#8B6B4A';
                html += '<div style="padding:10px;margin:5px 0;background:#3E3526;border-radius:8px;border-left:3px solid ' + cor + ';">';
                html += '<strong>' + a.produto + '</strong> <span style="color:' + cor + ';">(' + (a.prioridade||'').toUpperCase() + ')</span><br>';
                html += 'De R$ ' + a.preco_normal.toFixed(2) + ' por <span style="color:#4CAF50;">R$ ' + a.preco_promocional.toFixed(2) + '</span> (' + a.desconto + ' OFF)<br>';
                html += '🏪 ' + a.fornecedor + ' | ⏰ ' + a.validade + '</div>';
            });
        } else { html = '<p style="color:#8B6B4A;">Nenhuma promoção no momento.</p>'; }
        document.getElementById('resultadoAlertas').innerHTML = html;
    } catch(e) { document.getElementById('resultadoAlertas').innerHTML = '<p style="color:#C23B22;">Erro.</p>'; }
}

async function carregarProdutos() {
    document.getElementById('resultadoProdutos').innerHTML = '<p style="color:#8B6B4A;">Carregando...</p>';
    try {
        var resp = await fetch('/api/monitor/produtos'), data = await resp.json();
        var html = '';
        data.forEach(function(cat) {
            html += '<h4 style="color:#D4B896;margin:10px 0 5px;">📦 ' + cat.categoria + '</h4>';
            cat.itens.forEach(function(i) {
                html += '<p style="padding:5px;margin:2px 0;background:#3E3526;border-radius:6px;">• <strong>' + i.nome + '</strong> - R$ ' + i.preco_medio.toFixed(2) + '/' + i.unidade + ' | 🏪 ' + i.fornecedor + '</p>';
            });
        });
        document.getElementById('resultadoProdutos').innerHTML = html || '<p style="color:#8B6B4A;">Nenhum produto monitorado.</p>';
    } catch(e) { document.getElementById('resultadoProdutos').innerHTML = '<p style="color:#C23B22;">Erro.</p>'; }
}

async function carregarFornecedores() {
    document.getElementById('resultadoFornecedores').innerHTML = '<p style="color:#8B6B4A;">Buscando...</p>';
    try {
        var resp = await fetch('/api/monitor/fornecedores'), data = await resp.json();
        var html = '';
        (data.categorias || []).forEach(function(cat) {
            html += '<h4 style="color:#D4B896;margin:10px 0 5px;">' + cat.categoria + '</h4>';
            (cat.fornecedores || []).forEach(function(f) {
                html += '<p style="padding:5px;margin:2px 0;background:#3E3526;border-radius:6px;">🏪 <strong>' + f.nome + '</strong> - ' + f.diferencial + '</p>';
            });
        });
        html += '<p style="margin-top:8px;color:#D4B896;">💡 ' + (data.dica_negociacao || '') + '</p>';
        document.getElementById('resultadoFornecedores').innerHTML = html || '<p style="color:#8B6B4A;">Nenhum.</p>';
    } catch(e) { document.getElementById('resultadoFornecedores').innerHTML = '<p style="color:#C23B22;">Erro.</p>'; }
}
</script>
{% endblock %}
